<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Nemo quick demo poster">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2e2"/>
      <stop offset="55%" stop-color="#f9dfbd"/>
      <stop offset="100%" stop-color="#eac58f"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.22"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#vignette)"/>
  <g opacity="0.95">
    <rect x="240" y="210" width="800" height="300" rx="24" fill="#fff8f0" stroke="#c6ae87" stroke-width="4"/>
    <text x="640" y="315" text-anchor="middle" fill="#3b2a12" font-size="54" font-family="Rubik, Arial, sans-serif" font-weight="700">NEMO OS</text>
    <text x="640" y="380" text-anchor="middle" fill="#5a4424" font-size="36" font-family="Rubik, Arial, sans-serif" font-weight="600">From Chaos to Daily Execution</text>
    <text x="640" y="430" text-anchor="middle" fill="#6a5637" font-size="24" font-family="Rubik, Arial, sans-serif">10-second quick walkthrough</text>
  </g>
</svg>
